[mgr]
ratio         = [1, 3, 4]
sort_by       = "natural"
sort_sensitive = false
sort_reverse  = false
sort_dir_first = true
linemode      = "none"
show_hidden   = true
show_symlink  = true
scrolloff     = 5
mouse_events  = ["click", "scroll", "touch"]
title_format  = "{cwd}"

[preview]
wrap         = "no"
tab_size     = 2
max_width    = 800
max_height   = 1200
image_filter = "lanczos3"
image_quality = 75

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Edit with Neovim" },
]
open = [
  { run = 'xdg-open "$@"', orphan = true, desc = "Open" },
]
reveal = [
  { run = 'thunar "$(dirname "$0")"', orphan = true, desc = "Reveal" },
]
pager = [
  { run = 'batcat "$@"', block = true, desc = "View with bat" },
]
inkscape = [
  { run = 'inkscape "$@"', orphan = true, desc = "Edit with Inkscape" },
]
zathura = [
  { run = 'zathura "$@"', orphan = true, desc = "Open with Zathura" },
]
okular = [
  { run = 'okular "$@"', orphan = true, desc = "Open with Okular" },
]

[open]
rules = [
  { url = "*/", use = ["edit", "open", "reveal"] },
  { url = "*.ai", use = ["inkscape", "open", "reveal"] },
  { url = "*.json", use = ["edit", "pager", "reveal"] },
  { mime = "text/*", use = ["edit", "pager", "reveal"] },
  { mime = "image/svg+xml", use = ["inkscape", "open", "edit", "reveal"] },
  { mime = "image/*", use = ["open", "reveal"] },
  { mime = "video/*", use = ["open", "reveal"] },
  { mime = "audio/*", use = ["open", "reveal"] },
  { mime = "inode/x-empty", use = ["edit", "reveal"] },
  { mime = "application/json", use = ["edit", "pager", "reveal"] },
  { mime = "application/x-*", use = ["open", "reveal"] },
  { mime = "application/pdf", use = ["zathura", "okular", "open", "reveal"] },
  { mime = "*", use = ["open", "reveal"] },
]

[input]
cursor_blink = true

cd_origin     = "top-center"
cd_offset     = [0, 2, 50, 3]

create_origin = "top-center"
create_offset = [0, 2, 50, 3]

rename_origin = "hovered"
rename_offset = [0, 1, 50, 3]

filter_origin = "top-center"
filter_offset = [0, 2, 50, 3]

find_origin   = "top-center"
find_offset   = [0, 2, 50, 3]

search_origin = "top-center"
search_offset = [0, 2, 50, 3]

shell_origin  = "top-center"
shell_offset  = [0, 2, 50, 3]

[confirm]
trash_origin     = "center"
trash_offset     = [0, 0, 70, 20]

delete_origin    = "center"
delete_offset    = [0, 0, 70, 20]

overwrite_origin = "center"
overwrite_offset = [0, 0, 50, 15]

quit_origin      = "center"
quit_offset      = [0, 0, 50, 15]

[pick]
open_origin = "hovered"
open_offset = [0, 1, 50, 25]

[which]
sort_by       = "none"
sort_sensitive = false
sort_reverse  = false
